name: morning-briefing
cron: 0 8 * * 1-5
model: deepseek/deepseek-v4-flash
output: wiki/2 Areas/Daily Notes/YYYY-MM-DD.md
prepend: true
prompt: >
  Read memory/staging/ and memory/index.md, then produce a concise morning
  briefing digest covering:

  - What was worked on recently (last 48h)
  - What's in-flight
  - Any stale threads requiring attention
  - Top 1-3 priorities for today

  Format as a "## Morning Briefing" section with bullet points.

  If the daily note already has content, your briefing will be prepended above it.
  Do NOT include YAML frontmatter — the output router handles that.

  IMPORTANT: Output ONLY the markdown. Do not wrap it in ```markdown code blocks.
  Do not write to a file — print it to stdout.
skills:
  - session-search
