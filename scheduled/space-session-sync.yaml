name: space-session-sync
cron: 0 */6 * * *
model: deepseek/deepseek-v4-flash
prompt: >
  Run the space session sync script to reconcile OpenCode session history:

  bun run scripts/spaces/sync-sessions.ts

  This scans all OpenCode sessions for space markers and updates each space's
  SESSIONS.md with any new associations. Output any changes to stdout.
