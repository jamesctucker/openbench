name: weekly-review
cron: 0 9 * * 1
model: deepseek/deepseek-v4-flash
output: wiki/2 Areas/Daily Notes/YYYY-MM-DD.md
append: true
prompt: >
  Run the review-memory skill to analyze recent sessions.

  Then produce a "## Weekly Review" section summarizing:
  - Key patterns found
  - Top automation candidates
  - Memory index updates needed

  Output ONLY the markdown section. Do not wrap in code blocks.
  Do not write to a file — print it to stdout.
skills:
  - review-memory
